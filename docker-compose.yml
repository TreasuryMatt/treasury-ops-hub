services:

  postgres:
    image: postgres:16-alpine
    container_name: ops_hub_postgres
    environment:
      POSTGRES_USER: opshub_user
      POSTGRES_PASSWORD: opshub_password
      POSTGRES_DB: opshub
    ports:
      - '5433:5432'
    volumes:
      - ops_hub_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U opshub_user -d opshub']
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: ops_hub_server
    ports:
      - '3021:3021'
    environment:
      DATABASE_URL: postgresql://opshub_user:opshub_password@postgres:5432/opshub
      PORT: 3021
      NODE_ENV: development
      MOCK_CAIA: 'true'
      JWT_SECRET: dev-secret-change-in-prod
      JWT_EXPIRES_IN: 8h
      CLIENT_URL: http://localhost:3020
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma generate && npx prisma migrate deploy && npm run prisma:seed && npx nodemon --watch src --watch prisma/schema.prisma --ext ts,prisma --exec 'npx prisma generate && ts-node src/index.ts'"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: ops_hub_client
    ports:
      - '3020:3020'
    environment:
      PORT: 3020
      REACT_APP_API_URL: http://localhost:3021/api
      CHOKIDAR_USEPOLLING: 'true'
      WDS_SOCKET_PORT: 3020
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    depends_on:
      - server

volumes:
  ops_hub_pgdata:
